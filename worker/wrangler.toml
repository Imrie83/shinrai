name            = "shinrai-audit"
main            = "src/index.js"
compatibility_date = "2024-09-01"

# Secrets — never stored here, set via CLI:
#
#   npx wrangler secret put AI_PROVIDER        # "ollama", "openai", or "claude"
#   npx wrangler secret put ALLOWED_ORIGIN     # https://imrie83.github.io
#
#   --- Ollama (prototyping) ---
#   npx wrangler secret put OLLAMA_BASE_URL    # your cloudflared tunnel URL
#   npx wrangler secret put OLLAMA_MODEL       # qwen3.5:9b  (default, fits 8GB VRAM entirely)
#                                              # qwen3.5:27b if you want higher quality (offloads to RAM, slower)
#                                              # qwen3.5:4b  if you need faster responses
#
#   --- OpenAI / Groq (when ready) ---
#   npx wrangler secret put OPENAI_BASE_URL
#   npx wrangler secret put OPENAI_API_KEY
#   npx wrangler secret put OPENAI_MODEL
#
#   --- Claude (when ready) ---
#   npx wrangler secret put ANTHROPIC_API_KEY
#   npx wrangler secret put ANTHROPIC_MODEL

# Local dev overrides — used by `wrangler dev`, NOT deployed
[dev]
port = 8787

# For local dev you can put non-secret vars here (secrets still use CLI)
[vars]
AI_PROVIDER            = "ollama"
OLLAMA_BASE_URL        = "http://localhost:11434"
OLLAMA_MODEL           = "qwen3.5:9b"
SCREENSHOT_SERVICE_URL = "http://localhost:3000"
