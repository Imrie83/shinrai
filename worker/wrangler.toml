name            = "shinrai-audit"
main            = "src/index.js"
compatibility_date = "2024-09-01"

# Secrets — set via CLI (never stored in this file):
#
#   npx wrangler secret put AI_PROVIDER        # "claude" (recommended), "openai", or "ollama"
#   npx wrangler secret put ALLOWED_ORIGIN     # https://imrie83.github.io
#
#   --- Claude (recommended) ---
#   npx wrangler secret put ANTHROPIC_API_KEY
#   npx wrangler secret put ANTHROPIC_MODEL    # claude-haiku-4-5-20251001 (default — fast + cheap)
#                                              # claude-sonnet-4-6 for higher quality
#
#   --- Screenshot — Browserless.io (production) ---
#   npx wrangler secret put BROWSERLESS_API_KEY   # from https://browserless.io dashboard
#   (when set, the local SCREENSHOT_SERVICE_URL is ignored)
#
#   --- Screenshot — local Playwright service (dev/fallback) ---
#   npx wrangler secret put SCREENSHOT_SERVICE_URL  # e.g. your cloudflared tunnel URL
#
#   --- OpenAI (optional alternative) ---
#   npx wrangler secret put OPENAI_BASE_URL
#   npx wrangler secret put OPENAI_API_KEY
#   npx wrangler secret put OPENAI_MODEL
#
#   --- Ollama (local prototyping only) ---
#   npx wrangler secret put OLLAMA_BASE_URL    # your cloudflared tunnel URL
#   npx wrangler secret put OLLAMA_MODEL       # qwen3.5:9b

# Local dev overrides — used by `wrangler dev`, NOT deployed
[dev]
port = 8787

# For local dev you can put non-secret vars here (secrets still use CLI)
[vars]
AI_PROVIDER            = "ollama"
OLLAMA_BASE_URL        = "http://localhost:11434"
OLLAMA_MODEL           = "qwen3.5:9b"
SCREENSHOT_SERVICE_URL = "http://localhost:3000"
